; ─────────────────────────────────────────────────────────────────────
; pytest configuration for the backend.
;
; Why this file exists
; --------------------
; `/app/backend/` historically accumulated *standalone* scripts whose
; filenames match pytest's default discovery patterns (`*_test.py`,
; `test_*.py`) but are NOT actual pytest tests. They:
;   • execute top-level code at import time,
;   • call `requests.get(<preview-URL>)`  → 30s timeouts on collection,
;   • use `sys.exit(0|1)` as their pass/fail signal.
;
; The real pytest suite lives in `tests/`. Mixing both inevitably caused:
;   - 4 "errors during collection" (top-level SystemExit raised by
;     scripts: backend_test.py, live_recommendation_history_test.py,
;     live_recommendation_history_advanced_test.py, mlb_under_veto_test.py)
;   - 5 HTTP-timeout errors (test_backend_api.py + test_phase15_*::test_api_endpoints)
;   - 1 cross-contamination flake on tests/test_f83_2_xg_recent_averages.py::
;     TestComputeRecentAveragesPartial::test_partial_sample_when_l5_missing_on_one_side
;     (pollution from a legacy script's top-level import + sys.path mutation).
;
; By scoping `testpaths` to `tests/` we exclude the legacy scripts
; cleanly. They remain runnable as standalone scripts via
; `python <script>.py` and the supervisor never touches them.
;
; This is the documented, idiomatic pytest way to fix this — no test
; code is renamed, no script is deleted, and the legacy scripts stay
; available for any operator that wants to invoke them directly.
; ─────────────────────────────────────────────────────────────────────

[pytest]
testpaths = tests
asyncio_mode = strict
# Keep warning output trimmed but never silenced.
filterwarnings =
    ignore::DeprecationWarning:fastapi.applications
    ignore::DeprecationWarning:fastapi.routing
